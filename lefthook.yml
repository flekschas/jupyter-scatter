pre-commit:
  parallel: true
  commands:
    ruff-format:
      glob: "*.py"
      run: uv run ruff format {staged_files}
      stage_fixed: true
    ruff-lint:
      glob: "*.py"
      run: uv run ruff check --fix {staged_files}
      stage_fixed: true
    biome-lint:
      glob: "js/src/**/*.{js,ts,jsx,tsx}"
      run: cd js && npm run lint

pre-push:
  parallel: true
  commands:
    pytest:
      run: uv run pytest
    js-test:
      run: cd js && npm run test
